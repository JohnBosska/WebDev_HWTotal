services:
  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_db
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders_db
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog-service:
    build: ./catalog-service
    environment:
      DATABASE_URL: postgresql+psycopg2://catalog:catalog@catalog-db:5432/catalog_db
      SEED_ON_STARTUP: "true"
    depends_on:
      catalog-db:
        condition: service_healthy
    ports:
      - "8001:8001"

  orders-service:
    build: ./orders-service
    environment:
      DATABASE_URL: postgresql+psycopg2://orders:orders@orders-db:5432/orders_db
      CATALOG_SERVICE_URL: http://catalog-service:8001
    depends_on:
      orders-db:
        condition: service_healthy
      catalog-service:
        condition: service_started
    ports:
      - "8002:8002"

  admin-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin_db
    volumes:
      - admin_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin-service:
    build: ./admin-service
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:admin@admin-db:5432/admin_db
      CATALOG_SERVICE_URL: http://catalog-service:8001
      ORDERS_SERVICE_URL: http://orders-service:8002
      JWT_SECRET: dev-secret-change-me
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
    depends_on:
      admin-db:
        condition: service_healthy
      catalog-service:
        condition: service_started
      orders-service:
        condition: service_started
    ports:
      - "8003:8003"

  storefront:
    build: ./storefront
    depends_on:
      catalog-service:
        condition: service_started
      orders-service:
        condition: service_started
    ports:
      - "8090:80"

volumes:
  catalog_db_data:
  orders_db_data:
  admin_db_data:
